  <script defer src="libs/docx-preview.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #c0392b;
      --on-primary: #ffffff;
      --primary-hover: #a93226;
      --primary-muted: #f5d6d0;
      --ink: #2c1810;
      --ink-muted: #5c4033;
      --ink-subtle: #8b7355;
      --ink-tertiary: #b0a08a;
      --canvas: #f7f3eb;
      --surface-1: #ede8dd;
      --surface-2: #e3dccf;
      --surface-3: #d6cebf;
      --hairline: #d4c9b5;
      --hairline-strong: #bfb49e;
      --danger: #c0392b;
      --danger-hover: #a93226;
      --warning: #d4a017;
      --warning-hover: #b8860b;
      --success: #27713a;
      --success-hover: #1e5c2e;
      --word-badge: #7b4a2e;
      --excel-badge: #3a6b35;
      --image-badge: #6b4c8a;
      --text-badge: #8b7355;
      --folder-icon: #c49a3c;
      --folder-open: #a67c2e;
      --overlay: rgba(44,24,16,0.5);
    }

    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: var(--canvas);
      color: var(--ink);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header — 卷首 */
    .header {
      background: var(--surface-1);
      color: var(--ink);
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 2px solid var(--primary);
      z-index: 10;
    }

    .header h1 {
      font-family: 'SimSun', serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
    }

    .header h1 svg { width: 22px; height: 22px; stroke: var(--primary); }

    .header-motto {
      display: flex;
      align-items: center;
      gap: 0;
      font-family: 'SimSun', serif;
      user-select: none;
      padding: 6px 32px;
      border: 2px solid var(--primary);
      border-radius: 2px;
      position: relative;
      background: linear-gradient(135deg, var(--surface-1), var(--canvas), var(--surface-1));
      box-shadow: inset 0 0 0 1px var(--primary-muted), 0 1px 4px rgba(0,0,0,0.08);
    }
    .header-motto::before,
    .header-motto::after {
      content: '';
      position: absolute;
      border: 1.5px solid var(--primary);
      opacity: 0.35;
      border-radius: 1px;
      pointer-events: none;
    }
    .header-motto::before {
      top: 3px; left: 3px; right: 3px; bottom: 3px;
    }
    .header-motto::after {
      top: -6px; left: -6px; right: -6px; bottom: -6px;
      border-width: 3px;
      opacity: 0.15;
      border-radius: 2px;
    }
    .header-motto span {
      padding: 0 12px;
      position: relative;
      color: var(--primary);
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 6px;
      cursor: pointer;
      transition: color 0.2s, text-shadow 0.2s, transform 0.15s;
    }
    .header-motto span:hover {
      color: #a93226;
      text-shadow: 0 0 10px rgba(192,57,43,0.6), 0 0 24px rgba(192,57,43,0.35), 0 0 40px rgba(243,156,18,0.2);
      transform: scale(1.08);
    }
    .header-motto span:active {
      transform: scale(0.95);
    }
    .header-motto span::before,
    .header-motto span::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary-muted), transparent);
    }
    .header-motto span::before { right: 100%; }
    .header-motto span::after { left: 100%; }
    .header-motto .motto-dot {
      width: 5px;
      height: 5px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.4;
      flex-shrink: 0;
    }
    .motto-seal {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 22px;
      height: 22px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(192,57,43,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 2;
    }
    .motto-seal:hover {
      transform: scale(1.2);
      box-shadow: 0 2px 8px rgba(192,57,43,0.6);
    }
    .motto-seal svg { width: 12px; height: 12px; stroke: #fff; }
    .motto-reveal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(44,24,16,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .motto-reveal.show { display: flex; }
    .motto-reveal-text {
      font-family: 'SimSun', serif;
      font-size: 72px;
      font-weight: 700;
      letter-spacing: 24px;
      color: #c0392b;
      text-shadow: 0 0 30px rgba(192,57,43,0.5), 0 0 60px rgba(192,57,43,0.25), 0 4px 12px rgba(0,0,0,0.4);
      animation: motto-reveal-in 0.6s ease-out;
      user-select: none;
    }
    @keyframes motto-reveal-in {
      0% { opacity: 0; transform: scale(0.6); letter-spacing: 60px; }
      100% { opacity: 1; transform: scale(1); letter-spacing: 24px; }
    }

    @keyframes motto-spark {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); }
    }
    .motto-spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      pointer-events: none;
      animation: motto-spark 0.5s ease-out forwards;
      z-index: 10;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .root-path {
      background: var(--canvas);
      border: 1px solid var(--hairline-strong);
      color: var(--ink);
      padding: 7px 14px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Microsoft YaHei', sans-serif;
      width: 340px;
      outline: none;
      transition: border-color 0.2s;
    }

    .root-path:focus { border-color: var(--primary); }
    .root-path::placeholder { color: var(--ink-tertiary); }

    .btn {
      padding: 7px 18px;
      background: transparent;
      border: 1px solid var(--hairline-strong);
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Microsoft YaHei', sans-serif;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      position: relative;
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(44,24,16,0.1); }
    .btn:active { transform: translateY(0); box-shadow: none; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-primary {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary-hover);
    }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 2px 8px rgba(192,57,43,0.25); }
    .btn-primary:active { background: #8b2820; }

    .btn-danger {
      background: transparent;
      border: 1.5px solid #2d6a6a;
      color: #2d6a6a;
    }
    .btn-danger:hover { background: #2d6a6a; color: #fff; box-shadow: 0 2px 8px rgba(45,106,106,0.2); }
    .btn-danger:active { background: #245858; color: #fff; }

    .btn-warning {
      background: transparent;
      border: 1.5px solid #b8860b;
      color: #9a7209;
    }
    .btn-warning:hover { background: #b8860b; color: #fff; box-shadow: 0 2px 8px rgba(184,134,11,0.2); }
    .btn-warning:active { background: #9a7209; color: #fff; }

    .btn-success {
      background: transparent;
      border: 1.5px solid #6b3a5c;
      color: #6b3a5c;
    }
    .btn-success:hover { background: #6b3a5c; color: #fff; box-shadow: 0 2px 8px rgba(107,58,92,0.2); }
    .btn-success:active { background: #572e4b; color: #fff; }

    .btn-outline {
      border: 1px solid var(--hairline-strong);
      color: var(--ink-muted);
    }
    .btn-outline:hover { background: var(--surface-1); color: var(--ink); border-color: var(--ink-subtle); }
    .btn-outline:active { background: var(--surface-2); }

    .btn svg { width: 15px; height: 15px; }

    .btn-tip {
      display: inline-flex;
      align-items: center;
      margin-left: 2px;
      cursor: help;
    }
    .btn-tip svg { width: 14px; height: 14px; opacity: 0.7; }
    .btn-tip:hover svg { opacity: 1; }

    .tip-bubble {
      position: fixed;
      background: linear-gradient(135deg, #2c1810, #3d2b1f);
      color: #f7f3eb;
      font-size: 12px;
      font-weight: 400;
      font-family: 'Microsoft YaHei', sans-serif;
      line-height: 1.6;
      padding: 8px 14px;
      border-radius: 4px;
      max-width: 300px;
      white-space: normal;
      letter-spacing: 0.2px;
      pointer-events: none;
      z-index: 9999;
      box-shadow: 0 4px 16px rgba(44,24,16,0.25), 0 1px 4px rgba(44,24,16,0.15);
      border: 1px solid rgba(196,154,60,0.15);
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .tip-bubble.show { opacity: 1; transform: scale(1); }
    .tip-bubble::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
    }
    .tip-bubble.tip-up::after {
      top: 100%;
      border-top-color: #3d2b1f;
    }
    .tip-bubble.tip-down::after {
      bottom: 100%;
      border-bottom-color: #2c1810;
    }

    /* Main Layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar — 目录卷 */
    .sidebar {
      width: 280px;
      min-width: 200px;
      background: var(--surface-1);
      border-right: 1px solid var(--hairline);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--hairline);
      font-family: 'SimSun', serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-2);
      color: var(--ink-muted);
    }

    .tree-container {
      flex: 1;
      overflow: auto;
      padding: 4px 0;
    }

    /* Tree — 典籍目录 */
    .tree-item { user-select: none; }

    .tree-label {
      display: flex;
      align-items: center;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 13px;
      color: var(--ink-muted);
      transition: all 0.12s ease;
      gap: 4px;
      border-left: 2px solid transparent;
    }

    .tree-label:hover {
      background: var(--surface-2);
      color: var(--ink);
      padding-left: 14px;
    }

    .tree-label:active {
      background: var(--surface-3);
      padding-left: 12px;
    }

    .tree-label.active {
      background: var(--primary-muted);
      color: var(--primary);
      border-left-color: var(--primary);
      font-weight: 500;
    }

    .tree-toggle {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--ink-tertiary);
      transition: transform 0.15s;
    }

    .tree-toggle.expanded { transform: rotate(90deg); }
    .tree-toggle.hidden { visibility: hidden; }

    .tree-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      margin-right: 4px;
    }

    .tree-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tree-children {
      display: none;
      padding-left: 14px;
    }

    .tree-children.open { display: block; }

    /* Content — 正文 */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      padding: 10px 20px;
      border-bottom: 1px solid var(--hairline);
      display: flex;
      gap: 8px;
      background: var(--surface-1);
      flex-wrap: wrap;
      align-items: center;
    }

    .preview-area {
      flex: 1;
      overflow: auto;
      padding: 24px 32px;
      background: var(--canvas);
      position: relative;
    }

    .preview-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--ink-tertiary);
      gap: 12px;
    }

    .preview-placeholder svg { width: 48px; height: 48px; opacity: 0.25; stroke: var(--ink-subtle); }

    .preview-title {
      font-family: 'SimSun', serif;
      font-weight: 600;
      font-size: 17px;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      color: var(--ink);
      padding-bottom: 10px;
      border-bottom: 2px solid var(--primary);
    }

    /* Excel Table — 表格 */
    .preview-area table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }

    .preview-area table td {
      border: 1px solid var(--hairline);
      padding: 7px 12px;
      text-align: left;
      vertical-align: middle;
      background: var(--canvas);
      color: var(--ink-muted);
    }

    .preview-area table tr:nth-child(even) td { background: var(--surface-1); }
    .preview-area table tr:hover td { background: var(--surface-2); color: var(--ink); }
    .preview-area table tr.filter-hidden { display: none; }
    .preview-area table tr.kw-hidden { display: none; }

    /* Filter header row — user selected */
    .preview-area table tr.filter-row td {
      background: var(--surface-2);
      color: var(--ink);
      font-weight: 600;
      font-size: 12px;
      position: relative;
      cursor: default;
    }

    /* Right-click hint on hover */
    .preview-area table tr:not(.filter-row) td { cursor: context-menu; }

    /* Filter row selector bar */
    .filter-row-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 8px 12px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: 4px;
      font-size: 13px;
      color: var(--ink-muted);
    }

    .filter-row-bar span { font-weight: 500; }

    .filter-row-bar select {
      padding: 4px 8px;
      border: 1px solid var(--hairline-strong);
      border-radius: 3px;
      background: var(--canvas);
      color: var(--ink);
      font-size: 12px;
      font-family: 'Microsoft YaHei', sans-serif;
      outline: none;
    }

    .filter-row-bar select:focus { border-color: var(--primary); }

    .filter-row-bar button {
      padding: 4px 12px;
      border: 1px solid var(--hairline-strong);
      border-radius: 3px;
      background: var(--surface-2);
      color: var(--ink-muted);
      font-size: 12px;
      cursor: pointer;
      font-family: 'Microsoft YaHei', sans-serif;
    }

    .filter-row-bar button:hover { background: var(--surface-3); color: var(--ink); }
    .filter-row-bar button.active-filter { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }

    /* Column filter */
    .col-filter-wrap {
      display: inline-block;
      position: relative;
      margin-left: 6px;
      vertical-align: middle;
    }

    .col-filter-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      color: var(--ink-subtle);
      font-size: 11px;
      line-height: 1;
      vertical-align: middle;
    }

    .col-filter-btn:hover { color: var(--primary); }
    .col-filter-btn.active { color: var(--primary); }

    .col-filter-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 50;
      background: var(--canvas);
      border: 1px solid var(--hairline-strong);
      border-radius: 4px;
      box-shadow: 0 4px 12px rgba(44,24,16,0.15);
      padding: 8px;
      min-width: 160px;
      max-height: 240px;
      overflow-y: auto;
    }

    .col-filter-dropdown.show { display: block; }

    .col-filter-dropdown label {
      display: block;
      padding: 3px 4px;
      font-size: 12px;
      font-weight: 400;
      color: var(--ink-muted);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .col-filter-dropdown label:hover { background: var(--surface-1); color: var(--ink); }

    .col-filter-dropdown input[type="checkbox"] { margin-right: 6px; accent-color: var(--primary); }

    .col-filter-actions {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--hairline);
    }

    .col-filter-actions button {
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid var(--hairline-strong);
      border-radius: 3px;
      background: var(--surface-1);
      color: var(--ink-muted);
      cursor: pointer;
      font-family: 'Microsoft YaHei', sans-serif;
    }

    .col-filter-actions button:hover { background: var(--surface-2); color: var(--ink); }

    .col-filter-search {
      width: 100%;
      padding: 4px 8px;
      margin-bottom: 6px;
      border: 1px solid var(--hairline-strong);
      border-radius: 3px;
      font-size: 12px;
      font-family: 'Microsoft YaHei', sans-serif;
      background: var(--canvas);
      color: var(--ink);
      outline: none;
    }

    .col-filter-search:focus { border-color: var(--primary); }
    .col-filter-search::placeholder { color: var(--ink-tertiary); }

    /* Global keyword filter bar */
    .keyword-filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px 12px;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: 4px;
    }

    .keyword-filter-bar span {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-muted);
      white-space: nowrap;
    }

    .keyword-filter-bar input {
      flex: 1;
      padding: 5px 10px;
      border: 1px solid var(--hairline-strong);
      border-radius: 3px;
      font-size: 13px;
      font-family: 'Microsoft YaHei', sans-serif;
      background: var(--canvas);
      color: var(--ink);
      outline: none;
    }

    .keyword-filter-bar input:focus { border-color: var(--primary); }
    .keyword-filter-bar input::placeholder { color: var(--ink-tertiary); }

    .keyword-filter-bar button {
      padding: 5px 14px;
      border: 1px solid var(--hairline-strong);
      border-radius: 3px;
      background: var(--surface-2);
      color: var(--ink-muted);
      font-size: 12px;
      cursor: pointer;
      font-family: 'Microsoft YaHei', sans-serif;
      white-space: nowrap;
    }

    .keyword-filter-bar button:hover { background: var(--surface-3); color: var(--ink); }
    .keyword-filter-bar button.active-kw { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }

    .preview-area table td.kw-highlight { background: var(--primary-muted) !important; color: var(--primary) !important; font-weight: 500; }

    /* Text Preview — 古文风 */
    .text-preview {
      background: var(--surface-1);
      color: var(--ink);
      padding: 24px;
      border-radius: 4px;
      font-family: 'SimSun', serif;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-all;
      overflow: auto;
      border: 1px solid var(--hairline);
    }

    /* Word Preview — docx-preview + TOC */
    .word-wrap { display: flex; gap: 0; max-width: 1200px; margin: 0 auto; }

    .word-toc {
      width: 220px;
      min-width: 180px;
      flex-shrink: 0;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-right: none;
      border-top: 3px solid var(--primary);
      border-radius: 4px 0 0 4px;
      padding: 16px 0;
      overflow-y: auto;
      max-height: 80vh;
      position: sticky;
      top: 0;
      align-self: flex-start;
    }

    .word-toc-title {
      font-family: 'SimSun', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      padding: 0 16px 10px;
      border-bottom: 1px solid var(--hairline);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .word-toc a {
      display: block;
      padding: 4px 16px;
      font-size: 13px;
      color: var(--ink-muted);
      text-decoration: none;
      line-height: 1.6;
      border-left: 2px solid transparent;
      transition: all 0.12s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .word-toc a:hover { color: var(--ink); background: var(--surface-2); }
    .word-toc a.active { color: var(--primary); border-left-color: var(--primary); font-weight: 500; }

    .word-toc a[data-level="2"] { padding-left: 28px; }
    .word-toc a[data-level="3"] { padding-left: 40px; font-size: 12px; }
    .word-toc a[data-level="4"] { padding-left: 52px; font-size: 12px; }
    .word-toc a[data-level="5"] { padding-left: 60px; font-size: 11px; }
    .word-toc a[data-level="6"] { padding-left: 68px; font-size: 11px; }

    .word-toc-empty {
      padding: 12px 16px;
      font-size: 12px;
      color: var(--ink-tertiary);
    }

    .word-preview-container {
      flex: 1;
      min-width: 0;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-top: 3px solid var(--primary);
      border-radius: 0 4px 4px 0;
      overflow: hidden;
    }

    .word-preview-container.no-toc {
      border-radius: 4px;
    }

    .word-preview-container .docx-wrapper {
      background: white !important;
      padding: 20px !important;
    }

    /* Word view switcher — inside TOC */
    .word-view-bar {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--hairline);
      margin-bottom: 4px;
    }

    .word-view-btn {
      flex: 1;
      padding: 4px 0;
      border: 1px solid var(--hairline-strong);
      border-radius: 3px;
      background: var(--surface-1);
      color: var(--ink-muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Microsoft YaHei', sans-serif;
      text-align: center;
    }

    .word-view-btn:hover { background: var(--surface-2); color: var(--ink); transform: translateY(-1px); }
    .word-view-btn:active { background: var(--surface-3); transform: translateY(0); }
    .word-view-btn.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
    .word-view-btn.active:hover { background: var(--primary-hover); }

    /* Reading view (mammoth) */
    .word-reading-view {
      flex: 1;
      min-width: 0;
      background: var(--canvas);
      color: var(--ink);
      padding: 32px 40px;
      border: 1px solid var(--hairline);
      border-top: 3px solid var(--primary);
      border-radius: 0 4px 4px 0;
      line-height: 1.9;
      font-size: 15px;
    }

    .word-reading-view h1, .word-reading-view h2, .word-reading-view h3,
    .word-reading-view h4, .word-reading-view h5, .word-reading-view h6 {
      font-family: 'SimSun', serif;
      color: var(--ink);
      margin: 20px 0 10px;
    }

    .word-reading-view h1 { font-size: 22px; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
    .word-reading-view h2 { font-size: 19px; border-bottom: 1px solid var(--hairline); padding-bottom: 6px; }
    .word-reading-view h3 { font-size: 16px; }

    .word-reading-view p { margin-bottom: 10px; text-indent: 2em; }
    .word-reading-view table { margin: 12px 0; border-collapse: collapse; width: 100%; }
    .word-reading-view table td, .word-reading-view table th { border: 1px solid var(--hairline); padding: 6px 10px; }
    .word-reading-view img { max-width: 100%; height: auto; }

    /* Scroll float buttons — 悬浮导航 */
    .scroll-float {
      position: fixed;
      right: 32px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .scroll-float.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .scroll-float-top { top: 80px; }
    .scroll-float-bottom { bottom: 24px; }

    .scroll-float button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--hairline-strong);
      background: var(--surface-1);
      color: var(--ink-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(44,24,16,0.12);
      transition: all 0.15s;
    }

    .scroll-float button:hover {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary);
      transform: scale(1.1);
    }

    .scroll-float button:active {
      transform: scale(0.95);
      background: var(--primary-hover);
    }

    .scroll-float button svg { width: 16px; height: 16px; }

    /* Sheet Tabs — 卷册切换 */
    .sheet-tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .sheet-tab {
      padding: 6px 16px;
      border: 1px solid var(--hairline);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: var(--surface-2);
      color: var(--ink-subtle);
      transition: all 0.15s;
    }

    .sheet-tab:hover { background: var(--surface-1); color: var(--ink); transform: translateY(-1px); }
    .sheet-tab:active { background: var(--surface-3); transform: translateY(0); }
    .sheet-tab.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
    .sheet-tab.active:hover { background: var(--primary-hover); }

    /* Excel view switcher */
    .excel-view-bar {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      margin-bottom: 10px;
    }

    .excel-view-btn {
      padding: 5px 14px;
      border: 1px solid var(--hairline-strong);
      border-radius: 4px;
      background: var(--surface-1);
      color: var(--ink-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Microsoft YaHei', sans-serif;
    }

    .excel-view-btn:hover { background: var(--surface-2); color: var(--ink); transform: translateY(-1px); }
    .excel-view-btn:active { background: var(--surface-3); transform: translateY(0); }
    .excel-view-btn.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
    .excel-view-btn.active:hover { background: var(--primary-hover); }

    .excel-original-view {
      width: 100%;
      max-height: 70vh;
      overflow: auto;
      border: 1px solid var(--hairline-strong);
      border-radius: 4px;
      background: var(--canvas);
      position: relative;
    }

    .excel-original-view table { border-collapse: collapse; table-layout: auto; }
    .excel-original-view td, .excel-original-view th {
      white-space: nowrap;
      font-size: 12px;
      line-height: 1.4;
    }

    .excel-original-view thead th {
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      padding: 3px 8px;
      font-weight: 500;
      font-size: 11px;
      color: var(--ink-muted);
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .excel-original-view tbody th {
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      padding: 3px 6px;
      font-weight: 400;
      font-size: 11px;
      color: var(--ink-muted);
      text-align: center;
      min-width: 36px;
      position: sticky;
      left: 0;
      z-index: 1;
    }

    .excel-original-view thead th:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
    }

    /* Modal — 告示牌 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--canvas);
      border: 1px solid var(--hairline-strong);
      border-top: 3px solid var(--primary);
      border-radius: 4px;
      padding: 24px;
      max-width: 700px;
      width: 90%;
      max-height: 80vh;
      overflow: auto;
      box-shadow: 0 8px 32px rgba(44,24,16,0.2);
    }

    .modal h3 {
      font-family: 'SimSun', serif;
      margin-bottom: 16px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--ink);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--hairline);
    }

    .result-item {
      padding: 10px 14px;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 13px;
      background: var(--surface-1);
    }

    .result-item.success { border-left: 3px solid var(--success); }
    .result-item.error { border-left: 3px solid var(--danger); }
    .result-item.info { border-left: 3px solid var(--warning); }

    .result-file { font-weight: 600; word-break: break-all; color: var(--ink); }
    .result-detail { color: var(--ink-subtle); margin-top: 6px; font-size: 12px; }

    /* Loading */
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--hairline);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast — 飞鸽传书 */
    .toast-container {
      position: fixed;
      top: 60px;
      right: 20px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 10px 20px;
      border-radius: 4px;
      color: var(--on-primary);
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(44,24,16,0.15);
      animation: slideIn 0.3s ease;
      max-width: 400px;
    }

    .toast.success { background: #2d6a6a; }
    .toast.error { background: var(--danger); }
    .toast.info { background: #9a7209; color: #fff; }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Resize handle */
    .resize-handle {
      width: 3px;
      cursor: col-resize;
      background: transparent;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .resize-handle:hover { background: var(--primary); }

    /* File count badge — 册数 */
    .badge {
      background: var(--primary-muted);
      color: var(--primary);
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface-1); }
    ::-webkit-scrollbar-thumb { background: var(--hairline-strong); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-tertiary); }

    /* Image Preview */
    .image-preview { max-width: 100%; max-height: 600px; border-radius: 4px; border: 1px solid var(--hairline); box-shadow: 0 2px 8px rgba(44,24,16,0.1); }

    /* Modal strong/code in results */
    .modal strong { color: var(--ink); }
    .modal code { background: var(--surface-2); padding: 2px 6px; border-radius: 2px; font-size: 12px; color: var(--primary); font-family: 'Microsoft YaHei', monospace; }
    .modal p { color: var(--ink-muted); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      大明帝国 · 文件管理
    </h1>
    <div class="header-motto">
      <div class="motto-dot"></div>
      <span>性格</span>
      <div class="motto-dot"></div>
      <span>格局</span>
      <div class="motto-dot"></div>
      <span>人心</span>
      <div class="motto-dot"></div>
      <div class="motto-seal" onclick="document.getElementById('mottoReveal').classList.add('show')" title="印">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
    </div>
    <div class="motto-reveal" id="mottoReveal" onclick="this.classList.remove('show')">
      <div class="motto-reveal-text">知行合一</div>
    </div>
    <div class="header-actions">
      <input type="text" class="root-path" id="rootPath" placeholder="输入根目录路径（默认上级目录）">
      <button class="btn btn-primary" onclick="loadTree()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        刷新
      </button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <span>卷 目</span>
        <span class="badge" id="fileCount">0 册</span>
      </div>
      <div class="tree-container" id="treeContainer">
        <div class="preview-placeholder">
          <div class="loading" style="width:24px;height:24px;border-width:2px;"></div>
          <span style="font-size:13px;">正在翻阅目录...</span>
        </div>
      </div>
    </div>

    <div class="resize-handle" id="resizeHandle"></div>

    <div class="content">
      <div class="toolbar">
        <button class="btn btn-danger" id="btnMoveRevoked" onclick="moveRevokedFiles()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          移动撤回的返场故事音频文件
          <span class="btn-tip" data-tip="将所有文件名包含'撤回'的音频文件移动到撤回文件夹中">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="8.01" stroke-linecap="round"/><line x1="12" y1="12" x2="12" y2="16"/></svg>
          </span>
        </button>
        <button class="btn btn-warning" id="btnFindKeywords" onclick="findKeywordFiles()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          查找包含撤回返场故事的文档
          <span class="btn-tip" data-tip="搜索Word文档中同时包含返场故事和撤回关键词的文件">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="8.01" stroke-linecap="round"/><line x1="12" y1="12" x2="12" y2="16"/></svg>
          </span>
        </button>
        <button class="btn btn-success" id="btnRemoveContent" onclick="removeContent()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          删除需要撤回的返场故事
          <span class="btn-tip" data-tip="删除匹配文档中返场故事+撤回所在行及后续内容，原文件自动备份">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="8.01" stroke-linecap="round"/><line x1="12" y1="12" x2="12" y2="16"/></svg>
          </span>
        </button>
        <button class="btn btn-outline" onclick="viewLogs()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          操作日志
        </button>
        <button class="btn btn-primary" style="margin-left:auto;" onclick="showGuide()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          操作说明
        </button>
      </div>
      <div class="preview-area" id="previewArea">
        <div class="preview-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span style="font-size:15px; font-family:'SimSun',serif;">点击左侧卷目，翻阅典籍</span>
          <span style="font-size:12px;">支持 Word · Excel · 文本 · 图片</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Result Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalContent"></div>
      <div style="margin-top: 20px; text-align: right;">
        <button class="btn btn-primary" onclick="document.getElementById('modalOverlay').classList.remove('show')">关闭</button>
      </div>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal" style="max-width:440px;">
      <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;">
        <div id="confirmIcon" style="flex-shrink:0;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;"></div>
        <div>
          <h3 id="confirmTitle" style="margin-bottom:6px;font-size:15px;"></h3>
          <div id="confirmMessage" style="font-size:13px;color:var(--ink);line-height:1.7;white-space:pre-wrap;"></div>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid var(--hairline);">
        <button class="btn" id="confirmCancel" style="background:var(--surface-2);color:var(--ink-muted);border:1px solid var(--hairline);min-width:72px;" onmouseenter="this.style.background='var(--surface-3)'" onmouseleave="this.style.background='var(--surface-2)'" >取消</button>
        <button class="btn" id="confirmOk" style="min-width:72px;"></button>
      </div>
    </div>
  </div>

  <!-- Tooltip Bubble -->
  <div class="tip-bubble" id="tipBubble"></div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scroll Float Buttons -->
  <div class="scroll-float scroll-float-top" id="scrollFloatTop">
    <button onclick="document.getElementById('previewArea').scrollTo({top:0,behavior:'smooth'})" title="回到顶部">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
  </div>
  <div class="scroll-float scroll-float-bottom" id="scrollFloatBottom">
    <button onclick="var el=document.getElementById('previewArea');el.scrollTo({top:el.scrollHeight,behavior:'smooth'})" title="到底部">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>

  <!-- 引导层：双击打开index.html时显示 -->
  <div id="guideOverlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:var(--canvas); z-index:9999; font-family:'SimSun','SimSun',serif;">
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:40px;">
      <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="var(--primary)" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <h1 style="font-size:28px; font-weight:700; letter-spacing:3px; color:var(--ink); margin:20px 0 8px;">大明帝国 · 文件管理</h1>
      <p id="guideStatus" style="font-size:14px; color:var(--ink-subtle); margin-bottom:30px; font-family:'Microsoft YaHei',sans-serif;">正在检测服务状态...</p>
      <div id="guideActions" style="display:none;">
        <p style="font-size:14px; color:var(--ink-muted); margin-bottom:16px; line-height:1.8; font-family:'Microsoft YaHei',sans-serif;">
          服务未启动，请先双击以下文件启动服务：
        </p>
        <div style="background:var(--surface-1); border:1px solid var(--hairline); border-radius:4px; padding:20px 32px; margin-bottom:20px;">
          <code style="font-size:16px; color:var(--primary); font-family:'Microsoft YaHei',monospace;">start.bat</code>
          <p style="font-size:12px; color:var(--ink-tertiary); margin-top:8px; font-family:'Microsoft YaHei',sans-serif;">或双击 启动文件管理系统.vbs（无黑窗口）</p>
        </div>

  <script>
    // ===== 检测是否通过 file:// 协议直接打开 =====

    let currentRoot = '';

    // ===== Tooltip =====
    (function() {
      const bubble = document.getElementById('tipBubble');
      document.addEventListener('mouseover', (e) => {
        if (!e.target || !e.target.closest) return;
        const tip = e.target.closest('.btn-tip');
        if (!tip) return;
        const text = tip.getAttribute('data-tip');
        if (!text) return;
        bubble.textContent = text;
        bubble.className = 'tip-bubble';
        const rect = tip.getBoundingClientRect();
        bubble.style.visibility = 'hidden';
        bubble.style.display = 'block';
        const bw = bubble.offsetWidth;
        const bh = bubble.offsetHeight;
        bubble.style.visibility = '';
        let left = rect.left + rect.width / 2 - bw / 2;
        if (left < 4) left = 4;
        if (left + bw > window.innerWidth - 4) left = window.innerWidth - 4 - bw;
        if (rect.top - bh - 10 > 0) {
          bubble.style.top = (rect.top - bh - 8) + 'px';
          bubble.classList.add('tip-up');
        } else {
          bubble.style.top = (rect.bottom + 8) + 'px';
          bubble.classList.add('tip-down');
        }
        bubble.style.left = left + 'px';
        bubble.classList.add('show');
      });
      document.addEventListener('mouseout', (e) => {
        if (!e.target || !e.target.closest) return;
        const tip = e.target.closest('.btn-tip');
        if (!tip) return;
        if (e.relatedTarget && e.relatedTarget.closest && e.relatedTarget.closest('.btn-tip') === tip) return;
        bubble.classList.remove('show');
      });
    })();

    // ===== Toast =====

        setTimeout(() => toast.remove(), 300);

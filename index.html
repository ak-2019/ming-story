    // ===== Modal =====
    function showModal(title, content) {
      document.getElementById('modalTitle').innerHTML = title;
      document.getElementById('modalContent').innerHTML = content;
      document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('modalOverlay')) {
        document.getElementById('modalOverlay').classList.remove('show');
      }
    }

    function showConfirm({ title, message, type, okText }) {
      return new Promise(resolve => {
        const colors = {
          danger:  { bg: '#fef2f2', icon: '⚠️', iconBg: '#fee2e2', btnBg: 'var(--danger, #dc2626)', btnColor: '#fff' },
          warning: { bg: '#fffbeb', icon: '⚠️', iconBg: '#fef3c7', btnBg: '#d97706', btnColor: '#fff' },
          info:    { bg: '#eff6ff', icon: 'ℹ️', iconBg: '#dbeafe', btnBg: 'var(--primary)', btnColor: 'var(--on-primary)' },
        };
        const c = colors[type] || colors.info;
        const overlay = document.getElementById('confirmOverlay');
        const iconEl = document.getElementById('confirmIcon');
        const titleEl = document.getElementById('confirmTitle');
        const msgEl = document.getElementById('confirmMessage');
        const okBtn = document.getElementById('confirmOk');
        const cancelBtn = document.getElementById('confirmCancel');

        iconEl.textContent = c.icon;
        iconEl.style.background = c.iconBg;
        titleEl.textContent = title || '确认操作';
        msgEl.textContent = message || '';
        okBtn.textContent = okText || '确认';
        okBtn.style.background = c.btnBg;
        okBtn.style.color = c.btnColor;
        okBtn.style.border = 'none';

        overlay.classList.add('show');

        function cleanup() {
          overlay.classList.remove('show');
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          overlay.removeEventListener('click', onOverlay);
        }
        function onOk() { cleanup(); resolve(true); }
        function onCancel() { cleanup(); resolve(false); }
        function onOverlay(e) { if (e.target === overlay) { cleanup(); resolve(false); } }

        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
        overlay.addEventListener('click', onOverlay);
      });
    }

    // ===== Tree =====
    function getFileIcon(ext) {
      const icons = {
        '.docx': '<svg viewBox="0 0 24 24" fill="var(--word-badge)" stroke="none"><rect x="3" y="3" width="18" height="18" rx="3"/><text x="12" y="15" font-size="8" fill="white" text-anchor="middle" font-weight="bold">W</text></svg>',
        '.doc': '<svg viewBox="0 0 24 24" fill="var(--word-badge)" stroke="none"><rect x="3" y="3" width="18" height="18" rx="3"/><text x="12" y="15" font-size="8" fill="white" text-anchor="middle" font-weight="bold">W</text></svg>',
        '.xlsx': '<svg viewBox="0 0 24 24" fill="var(--excel-badge)" stroke="none"><rect x="3" y="3" width="18" height="18" rx="3"/><text x="12" y="15" font-size="8" fill="white" text-anchor="middle" font-weight="bold">X</text></svg>',
        '.xls': '<svg viewBox="0 0 24 24" fill="var(--excel-badge)" stroke="none"><rect x="3" y="3" width="18" height="18" rx="3"/><text x="12" y="15" font-size="8" fill="white" text-anchor="middle" font-weight="bold">X</text></svg>',
        '.pdf': '<svg viewBox="0 0 24 24" fill="var(--danger)" stroke="none"><rect x="3" y="3" width="18" height="18" rx="3"/><text x="12" y="15" font-size="7" fill="white" text-anchor="middle" font-weight="bold">PDF</text></svg>',
        '.txt': '<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-badge)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>',
        '.png': '<svg viewBox="0 0 24 24" fill="none" stroke="var(--image-badge)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>',
        '.jpg': '<svg viewBox="0 0 24 24" fill="none" stroke="var(--image-badge)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>',
        '.jpeg': '<svg viewBox="0 0 24 24" fill="none" stroke="var(--image-badge)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>',
      };
      return icons[ext] || '<svg viewBox="0 0 24 24" fill="none" stroke="var(--ink-tertiary)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
    }

    const folderIcon = '<svg viewBox="0 0 24 24" fill="var(--folder-icon)" stroke="var(--folder-open)" stroke-width="0.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>';
    const folderOpenIcon = '<svg viewBox="0 0 24 24" fill="var(--folder-open)" stroke="var(--folder-icon)" stroke-width="0.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>';

    const SPECIAL_FOLDERS = {
      '撤回文件夹': {
        color: '#2563eb',
        icon: '<svg viewBox="0 0 24 24" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>',
        openIcon: '<svg viewBox="0 0 24 24" fill="#1d4ed8" stroke="#2563eb" stroke-width="0.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>',
        badge: '撤回'
      },
      '备份文件夹': {
        color: '#7c3aed',
        icon: '<svg viewBox="0 0 24 24" fill="#7c3aed" stroke="#6d28d9" stroke-width="0.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>',
        openIcon: '<svg viewBox="0 0 24 24" fill="#6d28d9" stroke="#7c3aed" stroke-width="0.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>',
        badge: '备份'
      },
      '操作日志': {
        color: '#27713a',
        icon: '<svg viewBox="0 0 24 24" fill="#27713a" stroke="#1e5c2e" stroke-width="0.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>',
        openIcon: '<svg viewBox="0 0 24 24" fill="#1e5c2e" stroke="#27713a" stroke-width="0.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>',
        badge: '日志'
      }
    };

    function countFiles(node) {
      if (node.type === 'file') return 1;
      let count = 0;
      if (node.children) node.children.forEach(c => count += countFiles(c));
      return count;
    }

    function renderTree(node, depth = 0) {
      const item = document.createElement('div');
      item.className = 'tree-item';

      const label = document.createElement('div');
      label.className = 'tree-label';
      label.style.paddingLeft = (12 + depth * 16) + 'px';

      if (node.type === 'directory') {
        const toggle = document.createElement('span');
        toggle.className = 'tree-toggle';
        toggle.innerHTML = '<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M8 5l8 7-8 7z"/></svg>';

        const special = SPECIAL_FOLDERS[node.name];
        const fIcon = special ? special.icon : folderIcon;
        const fOpenIcon = special ? special.openIcon : folderOpenIcon;

        const icon = document.createElement('span');
        icon.className = 'tree-icon';
        icon.innerHTML = fIcon;

        const name = document.createElement('span');
        name.className = 'tree-name';
        name.textContent = node.name;
        if (special) name.style.color = special.color;

        label.appendChild(toggle);
        label.appendChild(icon);
        label.appendChild(name);

        if (special) {
          const badge = document.createElement('span');
          badge.style.cssText = `font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;background:${special.color}18;color:${special.color};border:1px solid ${special.color}30;font-weight:500;`;
          badge.textContent = special.badge;
          label.appendChild(badge);
        }

        const children = document.createElement('div');
        children.className = 'tree-children';
        if (node.children) {
          node.children.forEach(child => {
            children.appendChild(renderTree(child, depth + 1));
          });
        }

        label.addEventListener('click', () => {
          const isOpen = children.classList.toggle('open');
          toggle.classList.toggle('expanded', isOpen);
          icon.innerHTML = isOpen ? fOpenIcon : fIcon;
        });

        // 默认展开第一层
        if (depth === 0) {
          children.classList.add('open');
          toggle.classList.add('expanded');
          icon.innerHTML = fOpenIcon;
        }

        item.appendChild(label);
        item.appendChild(children);
      } else {
        const toggle = document.createElement('span');
        toggle.className = 'tree-toggle hidden';
        toggle.innerHTML = '&nbsp;';

        const icon = document.createElement('span');
        icon.className = 'tree-icon';
        icon.innerHTML = getFileIcon(node.ext);

        const name = document.createElement('span');
        name.className = 'tree-name';
        name.textContent = node.name;

        label.appendChild(toggle);
        label.appendChild(icon);
        label.appendChild(name);

        label.addEventListener('click', () => {
          if (activeLabel) activeLabel.classList.remove('active');
          label.classList.add('active');
          activeLabel = label;
          previewFile(node.fullPath, node.name);
        });

        item.appendChild(label);
        totalFiles++;
      }

      return item;
    }

    async function loadTree() {
      const root = document.getElementById('rootPath').value.trim();
      const container = document.getElementById('treeContainer');
      container.innerHTML = '<div class="preview-placeholder"><div class="loading" style="width:24px;height:24px;border-width:2px;"></div><span style="font-size:13px;">正在翻阅目录...</span></div>';

      try {
        const url = root ? `/api/tree?root=${encodeURIComponent(root)}` : '/api/tree';
        const resp = await fetch(url);
        const data = await resp.json();

        if (!data.success) {
          container.innerHTML = `<div class="preview-placeholder"><span style="color:var(--danger);">错误: ${data.error}</span></div>`;
          return;
        }

        currentRoot = data.root;
        localStorage.setItem('fileManager_root', currentRoot);
        totalFiles = 0;
        container.innerHTML = '';
        container.appendChild(renderTree(data.data));
        document.getElementById('fileCount').textContent = `${totalFiles} 册`;
        showToast(`已加载目录: ${data.root}`, 'success');
      } catch (e) {
        container.innerHTML = `<div class="preview-placeholder"><span style="color:var(--danger);">连接失败，请确保服务已启动</span></div>`;
      }
    }

    // ===== Preview =====
    async function previewFile(fullPath, fileName) {
      const area = document.getElementById('previewArea');
      area.innerHTML = '<div class="preview-placeholder"><div class="loading" style="width:24px;height:24px;border-width:2px;"></div><span style="font-size:13px;">正在展卷...</span></div>';
      _tocOriginalHtml = '';
      _tocReadingHtml = '';
      _tocReadingBuilt = false;

      try {
        const resp = await fetch(`/api/preview?path=${encodeURIComponent(fullPath)}`);
        const data = await resp.json();

        if (!data.success) {
          area.innerHTML = `<div class="preview-placeholder"><span style="color:var(--danger);">${data.error}</span></div>`;
          return;
        }

        let html = `<div class="preview-title">${data.fileName}</div>`;

        if (data.type === 'excel') {
          html += `<div class="excel-view-bar">
            <button class="excel-view-btn" id="btnExcelOriginal" onclick="switchExcelView('original')">📊 原样视图</button>
            <button class="excel-view-btn active" id="btnExcelReading" onclick="switchExcelView('reading')">📖 阅读视图</button>
          </div>`;
          const sheetNames = Object.keys(data.data);
          const styledData = data.styled || {};
          // Original view (styled tables)
          html += `<div id="excelOriginalView" style="display:none">`;
          if (sheetNames.length > 1) {
            html += '<div class="sheet-tabs">';
            sheetNames.forEach((name, i) => {
              html += `<div class="sheet-tab ${i === 0 ? 'active' : ''}" onclick="switchSheet(this, '${name}', 'excelOriginalView')">${name}</div>`;
            });
            html += '</div>';
          }
          sheetNames.forEach((name, i) => {
            html += `<div class="sheet-content excel-original-view" data-sheet="${name}" style="${i > 0 ? 'display:none' : ''}">${styledData[name] || data.data[name]}</div>`;
          });
          html += `</div>`;
          // Reading view (plain tables)
          html += `<div id="excelReadingView">`;
          if (sheetNames.length > 1) {
            html += '<div class="sheet-tabs">';
            sheetNames.forEach((name, i) => {
              html += `<div class="sheet-tab ${i === 0 ? 'active' : ''}" onclick="switchSheet(this, '${name}', 'excelReadingView')">${name}</div>`;
            });
            html += '</div>';
          }
          sheetNames.forEach((name, i) => {
            html += `<div class="sheet-content" data-sheet="${name}" style="${i > 0 ? 'display:none' : ''}">${data.data[name]}</div>`;
          });
          html += `</div>`;
        } else if (data.type === 'word') {
          html += `<div class="word-wrap"><div class="word-toc" id="wordToc"><div class="word-view-bar"><button class="word-view-btn active" id="btnViewOriginal" onclick="switchWordView('original')">📄 原样</button><button class="word-view-btn" id="btnViewReading" onclick="switchWordView('reading')">📖 阅读</button></div><div style="padding:8px 10px;border-bottom:1px solid var(--hairline);"><div style="display:flex;align-items:center;gap:4px;"><input type="text" id="wordSearchInput" placeholder="搜索内容..." onkeydown="if(event.key==='Enter'){searchWord(this.value)}" style="flex:1;padding:4px 8px;border:1px solid var(--hairline-strong);border-radius:3px;font-size:11px;outline:none;font-family:'Microsoft YaHei',sans-serif;min-width:0;"><button onclick="searchWord(document.getElementById('wordSearchInput').value)" style="border:1px solid var(--hairline);background:var(--surface-2);border-radius:3px;padding:3px 6px;cursor:pointer;font-size:11px;">🔍</button></div><div style="display:flex;align-items:center;gap:4px;margin-top:4px;"><span id="wordSearchCount" style="flex:1;font-size:10px;color:var(--ink-subtle);"></span><button onclick="wordSearchNav(-1)" style="border:1px solid var(--hairline);background:var(--surface-2);border-radius:3px;padding:1px 6px;cursor:pointer;font-size:10px;">▲</button><button onclick="wordSearchNav(1)" style="border:1px solid var(--hairline);background:var(--surface-2);border-radius:3px;padding:1px 6px;cursor:pointer;font-size:10px;">▼</button><button onclick="clearWordSearch(true)" style="border:1px solid var(--hairline);background:var(--surface-2);border-radius:3px;padding:1px 6px;cursor:pointer;font-size:10px;">✕</button></div></div><div class="word-toc-title">目 录</div><div id="wordTocLinks"></div></div><div id="wordOriginalView"><div class="word-preview-container" id="wordContainer"></div></div><div id="wordReadingView" style="display:none"><div class="word-reading-view" id="wordReadingBody">${data.html || ''}</div></div></div>`;
        } else if (data.type === 'text') {
          if (data.fileName && data.fileName.endsWith('.log')) {
            html += `<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;">
              <input type="text" id="logSearchInput" placeholder="搜索日志内容..." oninput="searchLog(this.value)" style="flex:1;padding:6px 10px;border:1px solid var(--hairline-strong);border-radius:4px;font-size:12px;outline:none;font-family:'Microsoft YaHei',sans-serif;">
              <span id="logSearchCount" style="font-size:11px;color:var(--ink-subtle);white-space:nowrap;"></span>
              <button onclick="logSearchNav(-1)" style="border:1px solid var(--hairline);background:var(--surface-2);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:12px;">▲</button>
              <button onclick="logSearchNav(1)" style="border:1px solid var(--hairline);background:var(--surface-2);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:12px;">▼</button>
            </div>`;
            html += `<div class="text-preview" id="logPreviewContent" style="white-space:normal;padding:16px;">${formatLogContent(data.data)}</div>`;
          } else {
            html += `<div class="text-preview">${escapeHtml(data.data)}</div>`;
          }
        } else if (data.type === 'image') {
          html += `<img class="image-preview" src="${data.data}" alt="${data.fileName}">`;
        }

        area.innerHTML = html;
        if (data.type === 'excel') {
          initExcelFilterUI();
        } else if (data.type === 'word') {
          renderDocx(data.data, data.headings || []);
        }
      } catch (e) {
        area.innerHTML = `<div class="preview-placeholder"><span style="color:var(--danger);">预览失败: ${e.message}</span></div>`;
      }
    }

    function switchSheet(tab, sheetName, parentId) {
      const parent = parentId ? document.getElementById(parentId) : document;
      parent.querySelectorAll('.sheet-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      parent.querySelectorAll('.sheet-content').forEach(c => c.style.display = 'none');
      parent.querySelector(`.sheet-content[data-sheet="${sheetName}"]`).style.display = '';
    }

    function switchExcelView(view) {
      const original = document.getElementById('excelOriginalView');
      const reading = document.getElementById('excelReadingView');
      const btnO = document.getElementById('btnExcelOriginal');
      const btnR = document.getElementById('btnExcelReading');
      if (!original || !reading) return;

      if (view === 'original') {
        original.style.display = '';
        reading.style.display = 'none';
        btnO.classList.add('active');
        btnR.classList.remove('active');
      } else {
        original.style.display = 'none';
        reading.style.display = '';
        btnO.classList.remove('active');
        btnR.classList.add('active');
      }
    }

    // ===== Excel Column Filter (user-selectable filter row) =====
    function initExcelFilterUI() {
      const readingView = document.getElementById('excelReadingView');
      if (!readingView) return;
      readingView.querySelectorAll('.sheet-content').forEach(container => {
        if (container.querySelector('.filter-row-bar')) return;
        const table = container.querySelector('table');
        if (!table) return;
        const rows = table.querySelectorAll('tbody tr');
        if (rows.length === 0) return;

        // Build row selector bar
        const bar = document.createElement('div');
        bar.className = 'filter-row-bar';

        const label = document.createElement('span');
        label.textContent = '筛选行：';
        bar.appendChild(label);

        const sel = document.createElement('select');
        const noneOpt = document.createElement('option');
        noneOpt.value = '-1';
        noneOpt.textContent = '— 不筛选 —';
        sel.appendChild(noneOpt);

        const maxPreview = Math.min(rows.length, 30);
        for (let i = 0; i < maxPreview; i++) {
          const tr = rows[i];
          const rowNum = tr.getAttribute('data-row') || i;
          const cells = tr.querySelectorAll('td');
          let preview = '';
          for (let j = 0; j < Math.min(cells.length, 4); j++) {
            const t = (cells[j].textContent || '').trim().slice(0, 12);
            if (t) preview += (preview ? ' | ' : '') + t;
          }
          const opt = document.createElement('option');
          opt.value = String(i);
          opt.textContent = `第 ${parseInt(rowNum) + 1} 行: ${preview || '(空)'}`;
          sel.appendChild(opt);
        }

        bar.appendChild(sel);

        const applyBtn = document.createElement('button');
        applyBtn.textContent = '设为筛选行';
        bar.appendChild(applyBtn);

        const clearBtn = document.createElement('button');
        clearBtn.textContent = '清除筛选';
        bar.appendChild(clearBtn);

        container.insertBefore(bar, table);

        applyBtn.addEventListener('click', () => {
          const idx = parseInt(sel.value);
          setFilterRow(container, table, idx);
        });

        clearBtn.addEventListener('click', () => {
          sel.value = '-1';
          setFilterRow(container, table, -1);
        });

        // Global keyword filter bar
        const kwBar = document.createElement('div');
        kwBar.className = 'keyword-filter-bar';

        const kwLabel = document.createElement('span');
        kwLabel.textContent = '关键词：';
        kwBar.appendChild(kwLabel);

        const kwInput = document.createElement('input');
        kwInput.type = 'text';
        kwInput.placeholder = '输入关键词过滤行（多个用空格分隔，支持模糊匹配）';
        kwBar.appendChild(kwInput);

        const kwBtn = document.createElement('button');
        kwBtn.textContent = '过滤';
        kwBar.appendChild(kwBtn);

        const kwClearBtn = document.createElement('button');
        kwClearBtn.textContent = '清除';
        kwBar.appendChild(kwClearBtn);

        container.insertBefore(kwBar, table);

        const doKwFilter = () => applyKeywordFilter(table, kwInput.value, kwBtn);

        kwBtn.addEventListener('click', doKwFilter);
        kwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doKwFilter(); });
        kwClearBtn.addEventListener('click', () => {
          kwInput.value = '';
          applyKeywordFilter(table, '', kwBtn);
        });
      });

      // Close dropdowns on outside click
      document.removeEventListener('click', closeAllFilterDropdowns);
      document.addEventListener('click', closeAllFilterDropdowns);
    }

    function closeAllFilterDropdowns() {
      document.querySelectorAll('.col-filter-dropdown.show').forEach(d => d.classList.remove('show'));
    }

    function setFilterRow(container, table, rowIdx) {
      const rows = table.querySelectorAll('tbody tr');

      // Clear previous filter state
      rows.forEach(tr => {
        tr.classList.remove('filter-row', 'filter-hidden');
        tr.querySelectorAll('.col-filter-wrap').forEach(w => w.remove());
      });

      if (rowIdx < 0 || rowIdx >= rows.length) return;

      const filterRow = rows[rowIdx];
      filterRow.classList.add('filter-row');

      const filterCells = filterRow.querySelectorAll('td');
      const dataRows = [...rows].filter((_, i) => i !== rowIdx);

      filterCells.forEach((td, colIdx) => {
        // Collect unique values from data rows at this column
        const values = new Set();
        dataRows.forEach(tr => {
          const cells = tr.querySelectorAll('td');
          if (cells[colIdx]) {
            const txt = (cells[colIdx].textContent || '').trim();
            if (txt) values.add(txt);
          }
        });

        if (values.size === 0) return;

        const wrap = document.createElement('span');
        wrap.className = 'col-filter-wrap';

        const btn = document.createElement('button');
        btn.className = 'col-filter-btn';
        btn.innerHTML = '&#9662;';
        btn.title = '筛选';

        const dropdown = document.createElement('div');
        dropdown.className = 'col-filter-dropdown';

        const actions = document.createElement('div');
        actions.className = 'col-filter-actions';
        const selAllBtn = document.createElement('button');
        selAllBtn.textContent = '全选';
        const clrBtn = document.createElement('button');
        clrBtn.textContent = '清除';
        actions.appendChild(selAllBtn);
        actions.appendChild(clrBtn);
        dropdown.appendChild(actions);

        // Search input inside dropdown
        const searchInput = document.createElement('input');
        searchInput.type = 'text';
        searchInput.className = 'col-filter-search';
        searchInput.placeholder = '搜索...';
        dropdown.appendChild(searchInput);

        const sortedVals = [...values].sort();
        const checkboxes = [];
        const labels = [];
        sortedVals.forEach(val => {
          const lbl = document.createElement('label');
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = true;
          cb.value = val;
          lbl.appendChild(cb);
          lbl.appendChild(document.createTextNode(val.length > 28 ? val.slice(0, 28) + '...' : val));
          dropdown.appendChild(lbl);
          checkboxes.push(cb);
          labels.push(lbl);
        });

        // Filter checkbox list by search keyword
        searchInput.addEventListener('input', () => {
          const kw = searchInput.value.trim().toLowerCase();
          labels.forEach((lbl, i) => {
            const match = !kw || sortedVals[i].toLowerCase().includes(kw);
            lbl.style.display = match ? '' : 'none';
          });
        });
        searchInput.addEventListener('click', (e) => e.stopPropagation());

        const doFilter = () => applyColumnFilters(table, rowIdx);

        selAllBtn.addEventListener('click', () => { checkboxes.forEach(cb => cb.checked = true); doFilter(); });
        clrBtn.addEventListener('click', () => { checkboxes.forEach(cb => cb.checked = false); doFilter(); });
        checkboxes.forEach(cb => cb.addEventListener('change', doFilter));

        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          document.querySelectorAll('.col-filter-dropdown.show').forEach(d => { if (d !== dropdown) d.classList.remove('show'); });
          dropdown.classList.toggle('show');
        });

        wrap.appendChild(btn);
        wrap.appendChild(dropdown);
        td.appendChild(wrap);
      });
    }

    function applyColumnFilters(table, filterRowIdx) {
      const rows = table.querySelectorAll('tbody tr');
      const filterRow = rows[filterRowIdx];
      if (!filterRow) return;

      const filterCells = filterRow.querySelectorAll('td');
      const filters = {};
      filterCells.forEach((td, ci) => {
        const wrap = td.querySelector('.col-filter-wrap');
        if (!wrap) return;
        const cbs = wrap.querySelectorAll('input[type="checkbox"]');
        if (cbs.length === 0) return;
        const allChecked = [...cbs].every(cb => cb.checked);
        if (allChecked) {
          wrap.querySelector('.col-filter-btn').classList.remove('active');
          return;
        }
        wrap.querySelector('.col-filter-btn').classList.add('active');
        const allowed = new Set();
        cbs.forEach(cb => { if (cb.checked) allowed.add(cb.value); });
        filters[ci] = allowed;
      });

      rows.forEach((tr, i) => {
        if (i === filterRowIdx) return;
        const cells = tr.querySelectorAll('td');
        let visible = true;
        for (const [ci, allowed] of Object.entries(filters)) {
          const cell = cells[parseInt(ci)];
          if (!cell) { visible = false; break; }
          const txt = (cell.textContent || '').trim();
          if (!allowed.has(txt)) { visible = false; break; }
        }
        tr.classList.toggle('filter-hidden', !visible);
      });
    }

    function applyKeywordFilter(table, keyword, kwBtn) {
      const rows = table.querySelectorAll('tbody tr');
      const kw = keyword.trim();

      // Clear highlights
      table.querySelectorAll('td.kw-highlight').forEach(td => td.classList.remove('kw-highlight'));

      if (!kw) {
        // Remove keyword filter, restore all rows (respect column filter)
        rows.forEach(tr => tr.classList.remove('kw-hidden'));
        if (kwBtn) kwBtn.classList.remove('active-kw');
        return;
      }

      if (kwBtn) kwBtn.classList.add('active-kw');

      // Split by space for multiple keywords (AND logic)
      const keywords = kw.toLowerCase().split(/\s+/).filter(k => k);

      rows.forEach(tr => {
        const cells = tr.querySelectorAll('td');
        const rowText = [...cells].map(c => (c.textContent || '').trim().toLowerCase()).join(' ');
        const match = keywords.every(k => rowText.includes(k));
        tr.classList.toggle('kw-hidden', !match);

        // Highlight matched cells
        if (match) {
          cells.forEach(cell => {
            const txt = (cell.textContent || '').toLowerCase();
            if (keywords.some(k => txt.includes(k))) {
              cell.classList.add('kw-highlight');
            }
          });
        }
      });
    }

    // ===== Word Search =====
    let _wordSearchMatches = [];
    let _wordSearchIdx = -1;

    function searchWord(keyword) {
      clearWordSearch();
      if (!keyword || !keyword.trim()) return;
      const original = document.getElementById('wordOriginalView');
      const reading = document.getElementById('wordReadingView');
      const container = (reading && reading.style.display !== 'none') ? document.getElementById('wordReadingBody') : document.getElementById('wordContainer');
      if (!container) return;
      const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      const kw = keyword.toLowerCase();
      nodes.forEach(node => {
        const text = node.textContent;
        const lower = text.toLowerCase();
        if (!lower.includes(kw)) return;
        const frag = document.createDocumentFragment();
        let lastIdx = 0;
        let idx = lower.indexOf(kw, 0);
        while (idx !== -1) {
          if (idx > lastIdx) frag.appendChild(document.createTextNode(text.substring(lastIdx, idx)));
          const mark = document.createElement('mark');
          mark.className = 'word-search-hl';
          mark.style.cssText = 'background:#fbbf24;color:#111;border-radius:2px;padding:0 1px;';
          mark.textContent = text.substring(idx, idx + keyword.length);
          frag.appendChild(mark);
          lastIdx = idx + keyword.length;
          idx = lower.indexOf(kw, lastIdx);
        }
        if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.substring(lastIdx)));
        node.parentNode.replaceChild(frag, node);
      });
      _wordSearchMatches = Array.from(container.querySelectorAll('.word-search-hl'));
      const countEl = document.getElementById('wordSearchCount');
      if (_wordSearchMatches.length > 0) {
        _wordSearchIdx = 0;
        scrollToWordMatch(0);
      } else if (countEl) {
        countEl.textContent = '无匹配';
      }
    }

    function wordSearchNav(dir) {
      if (_wordSearchMatches.length === 0) return;
      _wordSearchIdx = (_wordSearchIdx + dir + _wordSearchMatches.length) % _wordSearchMatches.length;
      scrollToWordMatch(_wordSearchIdx);
    }

    function scrollToWordMatch(idx) {
      _wordSearchMatches.forEach((el, i) => {
        el.style.background = i === idx ? '#f97316' : '#fbbf24';
        el.style.fontWeight = i === idx ? '700' : '';
      });
      _wordSearchMatches[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
      const countEl = document.getElementById('wordSearchCount');
      if (countEl) countEl.textContent = `共 ${_wordSearchMatches.length} 处 | ${idx + 1} / ${_wordSearchMatches.length}`;
    }

    function clearWordSearch(clearInput) {
      const containers = [document.getElementById('wordContainer'), document.getElementById('wordReadingBody')];
      containers.forEach(c => {
        if (!c) return;
        c.querySelectorAll('.word-search-hl').forEach(el => {
          const text = document.createTextNode(el.textContent);
          el.parentNode.replaceChild(text, el);
        });
        c.normalize();
      });
      _wordSearchMatches = [];
      _wordSearchIdx = -1;
      const countEl = document.getElementById('wordSearchCount');
      if (countEl) countEl.textContent = '';
      if (clearInput) {
        const input = document.getElementById('wordSearchInput');
        if (input) input.value = '';
      }
    }

    // ===== Word Render (docx-preview) =====
    async function renderDocx(base64Data, serverHeadings) {
      const container = document.getElementById('wordContainer');
      if (!container) return;

      try {
        // Convert base64 to ArrayBuffer
        const binaryStr = atob(base64Data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) {
          bytes[i] = binaryStr.charCodeAt(i);
        }
        const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });

        await docx.renderAsync(blob, container, null, {
          className: 'docx-preview',
          inWrapper: true,
          ignoreWidth: false,
          ignoreHeight: true,
          ignoreFonts: false,
          breakPages: true,
          renderHeaders: true,
          renderFooters: true,
          renderFootnotes: true,
          renderEndnotes: true,
        });

        // Build TOC using server-provided headings matched to rendered DOM
        buildWordToc(container, serverHeadings);
      } catch(e) {
        container.innerHTML = '<div style="padding:24px;color:var(--danger);">Word渲染失败: ' + e.message + '</div>';
      }
    }

    // Cache TOC links HTML for each view
    let _tocOriginalHtml = '';
    let _tocReadingHtml = '';
    let _tocReadingBuilt = false;

    function switchWordView(view) {
      clearWordSearch(true);
      const original = document.getElementById('wordOriginalView');
      const reading = document.getElementById('wordReadingView');
      const btnO = document.getElementById('btnViewOriginal');
      const btnR = document.getElementById('btnViewReading');
      const linksDiv = document.getElementById('wordTocLinks');
      if (!original || !reading) return;

      if (view === 'original') {
        original.style.display = '';
        reading.style.display = 'none';
        btnO.classList.add('active');
        btnR.classList.remove('active');
        if (linksDiv) { linksDiv.innerHTML = _tocOriginalHtml; bindTocClicks(linksDiv); }
      } else {
        original.style.display = 'none';
        reading.style.display = '';
        btnO.classList.remove('active');
        btnR.classList.add('active');
        if (!_tocReadingBuilt) { _tocReadingBuilt = true; buildReadingToc(); }
        if (linksDiv) { linksDiv.innerHTML = _tocReadingHtml; bindTocClicks(linksDiv); }
      }
    }

    function bindTocClicks(container) {
      container.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.getElementById(a.getAttribute('href').slice(1));
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            container.querySelectorAll('a').forEach(x => x.classList.remove('active'));
            a.classList.add('active');
          }
        });
      });
    }

    function buildReadingToc() {
      const body = document.getElementById('wordReadingBody');
      if (!body) return;

      const headings = body.querySelectorAll('h1, h2, h3, h4, h5, h6');
      if (headings.length === 0) {
        _tocReadingHtml = '<div class="word-toc-empty">此文档无标题结构</div>';
        return;
      }

      let html = '';
      headings.forEach((h, i) => {
        const id = 'reading-toc-' + i;
        h.id = id;
        const level = parseInt(h.tagName.charAt(1));
        const text = (h.textContent || '').trim();
        html += `<a href="#${id}" data-level="${level}" title="${text}">${text}</a>`;
      });
      _tocReadingHtml = html;

      // Scroll spy for reading view
      const previewArea = document.getElementById('previewArea');
      if (previewArea) {
        const targets = [...headings];
        previewArea.addEventListener('scroll', () => {
          if (document.getElementById('wordReadingView').style.display === 'none') return;
          const linksDiv = document.getElementById('wordTocLinks');
          if (!linksDiv) return;
          let current = null;
          targets.forEach(el => { if (el.getBoundingClientRect().top <= 120) current = el; });
          linksDiv.querySelectorAll('a').forEach(a => a.classList.remove('active'));
          if (current) {
            const link = linksDiv.querySelector(`a[href="#${current.id}"]`);
            if (link) link.classList.add('active');
          }
        });
      }
    }

    function buildWordToc(body, serverHeadings) {
      const linksDiv = document.getElementById('wordTocLinks');
      if (!linksDiv) return;

      let items = [];

      if (serverHeadings && serverHeadings.length > 0) {
        const allParas = body.querySelectorAll('p, h1, h2, h3, h4, h5, h6, span, div');
        const paraList = [...allParas].filter(el => {
          const t = (el.textContent || '').trim();
          return t && el.children.length <= 10;
        });

        let searchFrom = 0;
        serverHeadings.forEach((sh, i) => {
          const id = 'word-toc-' + i;
          for (let j = searchFrom; j < paraList.length; j++) {
            const elText = (paraList[j].textContent || '').trim();
            if (elText === sh.text || elText.startsWith(sh.text) || sh.text.startsWith(elText.slice(0, 10))) {
              paraList[j].id = id;
              items.push({ id, level: sh.level, text: sh.text });
              searchFrom = j + 1;
              break;
            }
          }
        });
      }

      if (items.length === 0) {
        const headings = body.querySelectorAll('h1, h2, h3, h4, h5, h6');
        headings.forEach((h, i) => {
          const id = 'word-toc-' + i;
          h.id = id;
          items.push({ id, level: parseInt(h.tagName.charAt(1)), text: (h.textContent || '').trim() });
        });
      }

      if (items.length === 0) {
        const allEls = body.querySelectorAll('[class*="Heading"], [class*="heading"]');
        allEls.forEach((el, i) => {
          const id = 'word-toc-' + i;
          el.id = id;
          const cls = el.className || '';
          const levelMatch = cls.match(/(\d)/);
          const level = levelMatch ? parseInt(levelMatch[1]) : 1;
          const text = (el.textContent || '').trim();
          if (text) items.push({ id, level: Math.min(level, 6), text });
        });
      }

      if (items.length === 0) {
        _tocOriginalHtml = '<div class="word-toc-empty">此文档无标题结构</div>';
        linksDiv.innerHTML = _tocOriginalHtml;
        return;
      }

      let html = '';
      items.forEach(item => {
        html += `<a href="#${item.id}" data-level="${item.level}" title="${item.text}">${item.text}</a>`;
      });
      _tocOriginalHtml = html;
      linksDiv.innerHTML = html;
      bindTocClicks(linksDiv);

      // Scroll spy for original view
      const previewArea = document.getElementById('previewArea');
      if (previewArea) {
        const allTargets = items.map(item => document.getElementById(item.id)).filter(Boolean);
        previewArea.addEventListener('scroll', () => {
          if (document.getElementById('wordOriginalView').style.display === 'none') return;
          const ld = document.getElementById('wordTocLinks');
          if (!ld) return;
          let current = null;

    // ===== SSE Helper =====
    function ssePost(url, body, { onProgress, onDone, onError }) {
      fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).then(resp => {
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        function read() {
          reader.read().then(({ done, value }) => {
            if (done) return;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const msg = JSON.parse(line.slice(6));
                if (msg.type === 'progress' && onProgress) onProgress(msg);
                else if (msg.type === 'done') onDone(msg);
              } catch(e) {}
            }
            read();
          }).catch(e => onError(e));
        }
        read();
      }).catch(e => onError(e));
    }

    const LOG_STYLES = {
      '移动撤回文件':       { color: '#2563eb', bg: '#eff6ff', icon: '📁', label: '移动' },
      '移动撤回文件-失败':  { color: '#2563eb', bg: '#eff6ff', icon: '❌', label: '移动失败' },
      '删除返场故事内容':   { color: '#7c3aed', bg: '#f5f3ff', icon: '🗑️', label: '删除' },
      '删除返场故事内容-失败': { color: '#7c3aed', bg: '#f5f3ff', icon: '❌', label: '删除失败' },
    };
    const LOG_DEFAULT_STYLE = { color: '#6b7280', bg: '#f9fafb', icon: '📋', label: '操作' };

    function formatLogContent(raw) {
      const lines = raw.split('\n');
      const entries = [];
      for (const line of lines) {
        if (!line.trim()) continue;
        const m = line.match(/^\[(\d{2}:\d{2}:\d{2})\]\s*\[([^\]]+)\]\s*([\s\S]*)$/);
        if (m) {
          entries.push({ time: m[1], action: m[2], details: [m[3]] });
        } else if (entries.length > 0) {
          entries[entries.length - 1].details.push(line);
        } else {
          entries.push({ time: '', action: '', details: [line] });
        }
      }
      return entries.map(e => {
        if (!e.time) return `<div class="log-line" style="padding:4px 8px;font-size:12px;color:var(--ink-muted);">${e.details.join('\n').replace(/</g,'&lt;')}</div>`;
        const s = LOG_STYLES[e.action] || LOG_DEFAULT_STYLE;
        const detailHtml = e.details.filter(d => d.trim()).map(d => {
          const trimmed = d.replace(/^\s+/, '');
          const arrow = trimmed.includes('→');
          if (arrow) {
            const parts = trimmed.split('→');
            return `<div style="display:flex;align-items:flex-start;gap:4px;padding:3px 0;"><span style="color:#9ca3af;">•</span><span style="word-break:break-all;">${parts[0].trim().replace(/</g,'&lt;')} <span style="color:${s.color};font-weight:600;">→</span> ${parts.slice(1).join('→').trim().replace(/</g,'&lt;')}</span></div>`;
          }
          return `<div style="padding:2px 0;"><span style="color:#9ca3af;">•</span> ${trimmed.replace(/</g,'&lt;')}</div>`;
        }).join('');
        const summaryLine = e.details[0] ? e.details[0].replace(/</g,'&lt;') : '';
        const fileList = e.details.length > 1 ? `<div style="margin-top:4px;padding:6px 8px;background:rgba(0,0,0,0.03);border-radius:4px;font-size:11px;line-height:1.6;">${detailHtml}</div>` : (summaryLine ? `<div style="margin-top:2px;font-size:12px;color:#374151;">${summaryLine}</div>` : '');
        return `<div class="log-line" style="margin-bottom:8px;border-left:3px solid ${s.color};background:${s.bg};border-radius:0 4px 4px 0;padding:8px 12px;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
            <span style="font-weight:700;color:#111;font-size:12px;font-family:monospace;">${e.time}</span>
            <span>${s.icon}</span>
            <span style="font-weight:600;color:${s.color};font-size:12px;">${e.action}</span>
          </div>
          ${fileList}
        </div>`;
      }).join('');
    }

    // ===== 日志搜索 =====
    let _logSearchMatches = [];
    let _logSearchIdx = -1;

    function searchLog(keyword) {
      const container = document.getElementById('logContent') || document.getElementById('logPreviewContent');
      const countEl = document.getElementById('logSearchCount');
      if (!container) return;
      // Clear previous highlights
      container.querySelectorAll('.log-highlight').forEach(el => {
        el.outerHTML = el.textContent;
      });
      _logSearchMatches = [];
      _logSearchIdx = -1;
      if (countEl) countEl.textContent = '';
      if (!keyword || !keyword.trim()) return;
      // Walk text nodes and highlight
      const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      const kw = keyword.toLowerCase();
      nodes.forEach(node => {
        const text = node.textContent;
        const lower = text.toLowerCase();
        if (!lower.includes(kw)) return;
        const frag = document.createDocumentFragment();
        let lastIdx = 0;
        let idx = lower.indexOf(kw, 0);
        while (idx !== -1) {
          if (idx > lastIdx) frag.appendChild(document.createTextNode(text.substring(lastIdx, idx)));
          const mark = document.createElement('span');
          mark.className = 'log-highlight';
          mark.style.cssText = 'background:#fbbf24;color:#111;border-radius:2px;padding:0 1px;';
          mark.textContent = text.substring(idx, idx + keyword.length);
          frag.appendChild(mark);
          lastIdx = idx + keyword.length;
          idx = lower.indexOf(kw, lastIdx);
        }
        if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.substring(lastIdx)));
        node.parentNode.replaceChild(frag, node);
      });
      _logSearchMatches = Array.from(container.querySelectorAll('.log-highlight'));
      if (countEl) countEl.textContent = _logSearchMatches.length > 0 ? `共 ${_logSearchMatches.length} 次出现 | 1 / ${_logSearchMatches.length}` : '无匹配';
      if (_logSearchMatches.length > 0) { _logSearchIdx = 0; scrollToLogMatch(0); }
    }

    function logSearchNav(dir) {
      if (_logSearchMatches.length === 0) return;
      _logSearchIdx = (_logSearchIdx + dir + _logSearchMatches.length) % _logSearchMatches.length;
      scrollToLogMatch(_logSearchIdx);
    }

    function scrollToLogMatch(idx) {
      _logSearchMatches.forEach((el, i) => {
        el.style.background = i === idx ? '#f97316' : '#fbbf24';
        el.style.fontWeight = i === idx ? '700' : '';
      });
      _logSearchMatches[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
      const countEl = document.getElementById('logSearchCount');
      if (countEl) countEl.textContent = `共 ${_logSearchMatches.length} 次出现 | ${idx + 1} / ${_logSearchMatches.length}`;
    }

      });

    // ===== Init =====
    (function() {
      const savedRoot = localStorage.getItem('fileManager_root');
      if (savedRoot) document.getElementById('rootPath').value = savedRoot;
    })();
    loadTree();
  </script>
</body>
